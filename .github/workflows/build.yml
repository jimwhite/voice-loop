# Voice Loop macOS Build & DMG
#
# Builds Voice Loop as a macOS .app (via Briefcase) and wraps it in a .dmg.
# Runs on Apple Silicon (macos-15 = M-series runner, macOS 15 Sequoia).
#
# Trigger: push to main, tags, or manual dispatch.

name: Build macOS App

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # needed for release uploads on tags

jobs:
  build:
    runs-on: macos-15   # Apple Silicon (macOS 15 Sequoia — required for moonshine-voice wheels)
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          brew install portaudio espeak-ng create-dmg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install briefcase -e .

      - name: Create macOS app (Briefcase)
        run: |
          briefcase create macOS app
          briefcase build macOS app

      - name: Sign the app with entitlements
        run: |
          APP_PATH="macOS/app/Voice Loop/Voice Loop.app"
          codesign --force --deep --sign - \
            --entitlements entitlements.plist \
            "$APP_PATH"

      - name: Package as DMG
        run: |
          APP_PATH="macOS/app/Voice Loop/Voice Loop.app"
          DMG_NAME="VoiceLoop-$(git describe --tags --always).dmg"
          create-dmg \
            --volname "Voice Loop" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 400 185 \
            --no-internet-enable \
            "$DMG_NAME" \
            "$APP_PATH" || true
          # create-dmg returns non-zero if no signing identity; the DMG is still valid
          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: VoiceLoop-macOS
          path: "*.dmg"
          if-no-files-found: warn

      - name: Upload to release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: "*.dmg"
